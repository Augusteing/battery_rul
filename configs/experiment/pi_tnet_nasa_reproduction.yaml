experiment:
  name: pi_tnet_nasa_reproduction
  paper: Integrating transformers into physics-informed neural networks
  dataset_config: configs/data/nasa.yaml
  model_config: configs/model/pi_tnet.yaml
  output_dir: results

reproduction_scope:
  dataset: NASA
  cells:
    - B0005
    - B0006
    - B0007
    - B0018
  tasks:
    - SOH estimation
    - RUL prediction

evaluation:
  metrics:
    - MAE
    - RMSE
    - MAPE
    - RUL_error
  figures:
    - capacity_degradation_curve
    - soh_prediction_curve
    - prediction_error_curve
    - physics_residual_curve

logging:
  save_config_snapshot: true
  save_predictions: true
  save_checkpoint: true
